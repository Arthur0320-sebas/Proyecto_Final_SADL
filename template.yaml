AWSTemplateFormatVersion: '2010-09-09'
Description: 'Infraestructura base: EC2 y S3 con versionado'

Resources:
  # 1. Bucket S3 con nombre dinámico y versionado
  MiBucketS3:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'devops-bucket-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled

  # 2. Instancia EC2 t2.micro con LabInstanceProfile
  MiInstanciaEC2:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0440d3b780d96b29d # Amazon Linux 2023 en us-east-1
      IamInstanceProfile: LabInstanceProfile
      Tags:
        - Key: Name
          Value: ServidorProyectoFinal

Outputs:
  InstanceId:
    Description: ID de la instancia creada
    Value: !Ref MiInstanciaEC2
  BucketName:
    Description: Nombre del bucket creado
    Value: !Ref MiBucketS3
